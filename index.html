<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Pengumpulan Data Karbon LCC 2030</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons for modern aesthetic -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="text-slate-800 antialiased min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8 flex flex-col md:flex-row gap-6 h-screen">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="glass-panel rounded-2xl p-6 h-full flex flex-col">
                <div class="mb-6 flex flex-col items-center text-center">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg0eQT3jRbvtSBqIF6ECnNk6uuXvz5Cl4-7VkTszVh0QZCn4UCY3GIvi22_PzL4skQxwQNz08JGTEOsfgD0nvuDBRxdSNfijc7uw8eGedj-rTdzfR6DeQmMcWfyo3zTgvWco7Jm3NgElwF2iZGhU7a2vN1BraGyuSMMI0OoyA7CFuWQIPf7ebXitR5xN8g/s1050/logo%20kkm%20-%20kementerian%20kesihatan%20malaysia%20-%20my.jpg" class="w-32 h-auto object-contain mb-3 mix-blend-multiply select-none cursor-zoom-in transition-colors duration-300" alt="Logo KKM">
                    <h1 class="text-xl font-bold text-emerald-700 mb-1 leading-tight">LCC 2030</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Cabaran Bandar Rendah Karbon</p>
                </div>
                
                <nav id="sidebar-nav" class="flex-1 overflow-y-auto pr-2">
                    <!-- Nav tabs will be dynamically rendered here -->
                </nav>

                <div class="mt-auto pt-6 border-t border-slate-200 space-y-3 relative p-1 overflow-visible">
                    <input type="file" id="import-file" accept=".json" class="hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="document.getElementById('import-file').click()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-2 rounded-lg shadow-sm transition-all flex flex-col items-center justify-center gap-1 text-xs text-center border border-slate-200">
                            <i class="ph ph-upload-simple text-sm"></i> Load<br>Form
                        </button>
                        <button id="btn-export" class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-medium py-2.5 px-2 rounded-lg shadow-sm transition-all flex flex-col items-center justify-center gap-1 text-xs text-center border border-emerald-200">
                            <i class="ph ph-download-simple text-sm"></i> Save<br>Form
                        </button>
                    </div>
                    
                    <button id="btn-word" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 px-4 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 text-sm mt-4">
                        <i class="ph-fill ph-file-doc text-lg"></i> Muat Turun Dokumen Laporan (Word)
                    </button>
                    
                    <button id="btn-google" onclick="sendToGoogleSheet()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 px-4 rounded-lg shadow-xl shadow-slate-900/20 transition-all flex items-center justify-center gap-2 text-sm mt-2 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-emerald-500 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300 z-0"></div>
                        <i class="ph-fill ph-paper-plane-tilt text-lg relative z-10 transition-transform group-hover:translate-x-1"></i> 
                        <span class="relative z-10">Hantar ke Kementerian (Google Sheets)</span>
                    </button>
                    <p class="text-center text-[10px] text-slate-400 mt-6 pb-2">&copy; Jabatan Kesihatan Negeri Kedah 2026</p>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden glass-panel rounded-2xl relative">
            <!-- Header -->
            <header class="px-8 py-6 border-b border-slate-200/50 bg-white/40 backdrop-blur-md sticky top-0 z-10 flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all">
                <div>
                    <h2 id="section-title" class="text-2xl font-bold text-slate-800">Memuatkan...</h2>
                    <p id="section-subtitle" class="text-sm text-slate-500 mt-1">Sila tunggu sebentar.</p>
                </div>
                
                <div id="year-toggle-container" class="bg-slate-200/60 p-1 rounded-xl inline-flex items-center hidden relative overflow-hidden ring-1 ring-slate-200">
                    <button onclick="setActiveYear('2025')" id="btn-year-2025" class="relative z-10 px-5 py-2 text-sm font-semibold rounded-lg transition-all text-emerald-700 bg-white shadow-sm ring-1 ring-slate-900/5">Garis Asas (2025)</button>
                    <button onclick="setActiveYear('2026')" id="btn-year-2026" class="relative z-10 px-5 py-2 text-sm font-medium rounded-lg transition-all text-slate-500 hover:text-slate-700">Pencapaian (2026)</button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div id="content-area" class="flex-1 overflow-y-auto p-8 fade-in">
                <!-- Dynamic Input Views will be rendered here -->
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="ph-fill ph-check-circle text-emerald-400 text-xl"></i>
        <span id="toast-msg" class="font-medium text-sm">Berjaya</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
